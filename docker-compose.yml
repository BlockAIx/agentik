services:
  agentik:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentik
    ports:
      - "${AGENTIK_PORT:-8420}:8420"
    volumes:
      - ./projects:/app/projects
      - ./opencode.jsonc:/app/opencode.jsonc:ro
      - ./budget.json:/app/budget.json
      # Named volumes for pnpm — keeps content store and virtual stores off
      # the bind mount, avoiding catastrophic I/O on Windows/macOS Docker.
      - pnpm_store:/pnpm-store
      - pnpm_vstore:/pnpm-vstore
    environment:
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENCODE_CMD=${OPENCODE_CMD:-opencode}
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  pnpm_store:
  pnpm_vstore: